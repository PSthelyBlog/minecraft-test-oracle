name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Oracle tests
        run: npm test
      - name: Production build
        run: npm run build

  lint:
    name: lint (eslint · prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier format check
        run: npm run format:check

  # The smoke render check is the one heavy PR gate (~1.3m). It only does real work
  # when the PR touches code or build inputs; for docs/config-only PRs the expensive
  # steps are skipped and the job still reports SUCCESS in seconds — so the required
  # check stays green without a job-level `if:` (a skipped required job would leave the
  # check "pending" and block the merge). The detection is inlined on purpose: routing
  # it through a shared `needs:` job would skip the required check if that job failed.
  # Mutation testing is NOT a PR gate (it runs locally via the pre-push hook); the
  # `mutation-badge` job below runs only on push to main to refresh the live badge.

  smoke:
    name: smoke (headless render check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect code/build changes
        id: changes
        run: |
          # Pick the diff range for this event (PR: base→head; push: before→after).
          # Fall back to the full gate on anything unexpected (new branch, force-push,
          # unfetched base) so we never under-run.
          case "${{ github.event_name }}" in
            pull_request) base="${{ github.event.pull_request.base.sha }}"; head="${{ github.event.pull_request.head.sha }}" ;;
            push)         base="${{ github.event.before }}";                head="${{ github.sha }}" ;;
            *)            echo "run=true" >>"$GITHUB_OUTPUT"; exit 0 ;;
          esac
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "No usable base ($base) — running the full gate."
            echo "run=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          files=$(git diff --name-only "$base" "$head")
          echo "Changed files:"; echo "$files"
          if echo "$files" | grep -qE '^(src/|test/|scripts/|index\.html|package\.json|package-lock\.json|\.npmrc|stryker\.config\.json|vitest\.config\.ts|vite\.config\.ts|tsconfig\.json|\.github/workflows/ci\.yml)'; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "No code/build changes — render check will be skipped."
            echo "run=false" >>"$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.run == 'true'
      # Pull Playwright's bundled Chromium + the Linux system libs it needs.
      # scripts/smoke.mjs falls back to this when CHROME_PATH is unset.
      - name: Install Chromium
        if: steps.changes.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      - name: Build
        if: steps.changes.outputs.run == 'true'
        run: npm run build
      # Serve the production build and boot it in headless Chromium (software WebGL
      # via SwiftShader). The smoke test asserts no console/page errors, the frame
      # loop ran, physics put the player on the ground, the hotbar built, and — the
      # render check — that the voxel world actually drew (terrain fills the frame;
      # a missing geometry upload would clear to bare sky and fail).
      - name: Preview + smoke
        if: steps.changes.outputs.run == 'true'
        env:
          URL: http://localhost:4173/
        run: |
          npm run preview -- --port 4173 --strictPort &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          npm run smoke
          kill $PREVIEW_PID
      - name: Upload smoke screenshot
        if: steps.changes.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-screenshot
          path: scripts/screenshot.png
          if-no-files-found: ignore
      - name: Skipped (no code/build changes)
        if: steps.changes.outputs.run != 'true'
        run: echo "Docs/config-only PR — render check not needed; required check passes."

  # Mutation testing is NOT a PR gate. The falsifiability gate runs LOCALLY via the
  # git pre-push hook (scripts/hooks/pre-push, installed once with `npm run hooks:install`):
  # it runs `npm run mutation:clean` before a push touching code/test/config and blocks the
  # push if the score drops below threshold. This job runs ONLY on push to main, purely to
  # (a) refresh the live Stryker-dashboard badge and (b) act as a post-merge backstop. It
  # blocks nothing (main is push-only via merges) and is not a required check, so it does
  # not slow PRs down. Docs/config-only pushes to main skip the heavy step.
  mutation-badge:
    name: mutation badge (push to main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect code/build changes
        id: changes
        run: |
          base="${{ github.event.before }}"; head="${{ github.sha }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "No usable base ($base) — running mutation."
            echo "run=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          files=$(git diff --name-only "$base" "$head")
          echo "Changed files:"; echo "$files"
          if echo "$files" | grep -qE '^(src/|test/|scripts/|index\.html|package\.json|package-lock\.json|\.npmrc|stryker\.config\.json|vitest\.config\.ts|vite\.config\.ts|tsconfig\.json|\.github/workflows/ci\.yml)'; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "No code/build changes — skipping the badge refresh."
            echo "run=false" >>"$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.run == 'true'
      # Publish the authoritative score to the Stryker dashboard (updates the README
      # badge). Still honours the break threshold (70) as a post-merge backstop, but it
      # gates nothing — the gate is the local pre-push hook. STRYKER_DASHBOARD_API_KEY is
      # a repo secret; the reporter catches an upload/auth error without failing the build.
      - name: StrykerJS + dashboard
        if: steps.changes.outputs.run == 'true'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: npm run mutation -- --reporters progress,clear-text,json,html,dashboard
      - name: Upload mutation report
        if: steps.changes.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: ignore
